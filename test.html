<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const p = new Promise((resolve, reject) => {
            setTimeout(() => {
                resolve('北京市');
            }, 2000);
        });

        const p2 = p.then(result => {
            console.log(result);
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    resolve(result + '--- 北京')
                }, 2000);
            })
        });

        console.log(p2);
        
    </script>
</body>

</html>
