<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手写Promise</title>
  </head>

  <body>
    <h2>链式编程-处理重复引用</h2>
    <script>
      // 执行异步任务
      function runAsynctask(callback) {
        if (typeof queueMicrotask === 'function') {
          queueMicrotask(callback)
        } else if (typeof MutationObserver === 'function') {
          const obs = new MutationObserver(callback)
          const divNode = document.createElement('div')
          obs.observe(divNode, { childList: true })
          divNode.innerText = 'itheima666'
        } else {
          setTimeout(callback, 0)
        }
      }

      /**
       * 链式编程-处理Promise(fulfilled状态)
       */
      const PENDING = 'pending'
      const FULFILLED = 'fulfilled'
      const REJECTED = 'rejected'
      class HMPromise {
        // 状态
        state = PENDING
        // 原因
        result = undefined
        // 回调函数数组
        #handlers = [] // [{onFulfilled,onRejected}...]

        // 构造函数
        constructor(func) {
          // pending->fulfilled
          const resolve = (result) => {
            if (this.state === PENDING) {
              this.state = FULFILLED
              this.result = result
              this.#handlers.forEach(({ onFulfilled }) => {
                onFulfilled(this.result)
              })
            }
          }
          // pending->rejected
          const reject = (result) => {
            if (this.state === PENDING) {
              this.state = REJECTED
              this.result = result
              this.#handlers.forEach(({ onRejected }) => {
                onRejected(this.result)
              })
            }
          }
          // 2. 处理异常
          try {
            func(resolve, reject)
          } catch (error) {
            // console.log('error:', error)
            reject(error)
          }
        }

        // then方法
        then(onFulfilled, onRejected) {
          onFulfilled =
            typeof onFulfilled === 'function' ? onFulfilled : (x) => x
          onRejected =
            typeof onRejected === 'function'
              ? onRejected
              : (x) => {
                  throw x
                }

          const p2 = new HMPromise((resolve, reject) => {
            if (this.state === FULFILLED) {
              runAsynctask(() => {
                try {
                  const x = onFulfilled(this.result)
                  // // 1. 处理重复引用
                  // if (x === p2) {
                  //   // console.log('返回了p2')
                  //   // 2. 抛出错误 Chaining cycle detected for promise #<Promise>
                  //   throw new TypeError('Chaining cycle detected for promise #<Promise>')
                  // }
                  // if (x instanceof HMPromise) {
                  //   x.then(res => resolve(res), err => reject(err))
                  // } else {
                  //   resolve(x)
                  // }
                  resolvePromise(x, p2, resolve, reject)
                } catch (error) {
                  reject(error)
                }
              })
            } else if (this.state === REJECTED) {
              runAsynctask(() => {
                try {
                  const x = onRejected(this.result)
                  resolvePromise(x, p2, resolve, reject)
                } catch (error) {
                  reject(error)
                }
              })
            } else if (this.state === PENDING) {
              this.#handlers.push({
                onFulfilled: () => {
                  runAsynctask(() => {
                    try {
                      const x = onFulfilled(this.result)
                      resolvePromise(x, p2, resolve, reject)
                    } catch (error) {
                      reject(error)
                    }
                  })
                },
                onRejected: () => {
                  runAsynctask(() => {
                    try {
                      const x = onRejected(this.result)
                      resolvePromise(x, p2, resolve, reject)
                    } catch (error) {
                      reject(error)
                    }
                  })
                },
              })
            }
          })
          return p2
        }

        catch(onRejected) {
          return this.then(undefined, onRejected)
        }

        finally(onFinally) {
          return this.then(onFinally, onFinally)
        }

        static resolve(value) {
          if (value instanceof HMPromise) {
            return value // 如果传入的值本身就是一个Promise对象，那么直接返回该对象
          }
          return new HMPromise((resolve, reject) => {
            // 其实这里reject没有定义，也可以省略
            resolve(value) // 否则，返回一个新的已解决的Promise对象，且其值为传入的值
          })
        }

        static reject(reason) {
          return new HMPromise((undefined, reject) => {
            reject(reason) // 返回一个新的已拒绝的Promise对象，且其原因（reason）为传入的值
          })
        }

        static race(promises) {
          // 1. 返回Promise
          return new HMPromise((resolve, reject) => {
            // 2. 判断是否为数组
            if (!Array.isArray(promises)) {
              return reject(new TypeError('Argument is not iterable'))
            }
            // 3. 等待第一个敲定
            promises.forEach((p) => {
              HMPromise.resolve(p).then(
                (res) => {
                  resolve(res)
                },
                (err) => {
                  reject(err)
                },
              )
            })
          })
        }

        static all(promises) {
          // 1. 返回Promise
          return new HMPromise((resolve, reject) => {
            // 2. 判断是否为数组
            if (!Array.isArray(promises))
              return reject(new TypeError('Argument is not iterable')) // 直接打断后续代码
            // 3. 空数组直接兑现
            if (promises.length === 0) return resolve(promises)
            // 4. 按照顺序记录结果
            const results = []
            let count = 0
            promises.forEach((p, index) => {
              HMPromise.resolve(p).then(
                (res) => {
                  results[index] = res
                  count++
                  // 全部完成
                  if (count === promises.length) {
                    resolve(results)
                  }
                },
                (err) => {
                  reject(err) // 只要有一个失败，整体就失败
                },
              )
            })
          })
        }

        static allSettled(promises) {
          // 1. 返回Promise
          return new HMPromise((resolve, reject) => {
            // 2. 判断是否为数组
            if (!Array.isArray(promises))
              return reject(new TypeError('Argument is not iterable')) // 直接打断后续代码
            // 3. 空数组直接兑现
            if (promises.length === 0) return resolve(promises)
            // 4. 按照顺序记录结果
            const results = []
            let count = 0
            promises.forEach((p, index) => {
              HMPromise.resolve(p).then(
                (res) => {
                  results[index] = { status: FULFILLED, value: res }
                  count++
                  if (count === promises.length) resolve(results)
                },
                (err) => {
                  results[index] = { status: REJECTED, reason: err }
                  count++
                  if (count === promises.length) resolve(results)
                },
              )
            })
          })
        }

        static any(promises) {
          // 1. 返回Promise
          return new HMPromise((resolve, reject) => {
            // 2. 判断是否为数组
            if (!Array.isArray(promises))
              return reject(new TypeError('Argument is not iterable')) // 直接打断后续代码
            // 3. 空数组直接拒绝
            if (promises.length === 0)
              return reject(
                new AggregateError([], 'All promises were rejected'),
              )
            // 4. 记录失败结果
            const errors = []
            let count = 0
            promises.forEach((p, index) => {
              HMPromise.resolve(p).then(
                (res) => {
                  resolve(res) // 有一个成功就兑现
                },
                (err) => {
                  errors[index] = err
                  count++
                  if (count === promises.length)
                    reject(
                      new AggregateError(errors, 'All promises were rejected'),
                    )
                },
              )
            })
          })
        }
      }

      function resolvePromise(x, p2, resolve, reject) {
        // 1. 处理重复引用
        if (x === p2) {
          // console.log('返回了p2')
          // 2. 抛出错误 Chaining cycle detected for promise #<Promise>
          throw new TypeError('Chaining cycle detected for promise #<Promise>')
        }
        if (x instanceof HMPromise) {
          x.then(
            (res) => resolve(res),
            (err) => reject(err),
          )
        } else {
          resolve(x)
        }
      }

      // ------------- 测试代码 -------------
      const p1 = new HMPromise((resolve, reject) => {
        setTimeout(() => {
          reject(1)
        }, 2000)
      })
      const p2 = HMPromise.reject(2)
      const p3 = new HMPromise((resolve, reject) => {
        setTimeout(() => {
          // resolve(3)
          reject(3)
        }, 1000)
      })
      HMPromise.any().then(
        (res) => {
          console.log('res:', res)
        },
        (err) => {
          console.dir(err)
        },
      )
    </script>
  </body>
</html>
